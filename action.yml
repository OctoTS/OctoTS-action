name: "OctoTS Metrics Processor"
description: "Collects and stores code metrics as time series"

branding:
  icon: "clock"
  color: "purple"

inputs:
  format:
    description: "Output storage format (csv, json, parquet, excel, pickle)"
    default: "csv"
  input:
    description: "Input file"
    required: true
  output:
    description: "Output file"
    required: true
  branch:
    description: "Metrics branch"
    default: "metrics-data"

runs:
  using: docker
  image: Dockerfile
  args:
    - ${{ inputs.format }}
    - ${{ inputs.input }}
    - ${{ inputs.output }}
    - ${{ inputs.branch }}
