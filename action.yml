name: "OctoTS Metrics Processor"
description: "Collects and stores code metrics as time series"

inputs:
  input:
    description: "Input CSV file"
    required: true
  output:
    description: "Output CSV file"
    required: true
  branch:
    description: "Metrics branch"
    default: "metrics-data"

runs:
  using: "composite"
  steps:
    - name: Clone tools repo into temp directory
      run: |
        TOOLS_DIR="${{ runner.temp }}/octots_tools_$(date +%s)"
        git clone https://github.com/OctoTS/OctoTS-tools.git "$TOOLS_DIR"
        echo "OCTOTS_TOOLS_DIR=$TOOLS_DIR" >> $GITHUB_ENV
      shell: bash

    - name: Run processor
      run: bash "${{ github.action_path }}/entrypoint.sh" "${{ inputs.input }}" "${{ inputs.output }}" "${{ inputs.branch }}"
      shell: bash